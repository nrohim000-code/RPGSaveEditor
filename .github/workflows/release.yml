name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm install

      - name: Generate release notes
        id: release_notes
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');

            // Get all tags sorted by date
            const tags = await github.rest.repos.listTags({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            // Find previous tag (the one before current)
            const currentIndex = tags.data.findIndex(t => t.name === tag);
            const previousTag = currentIndex < tags.data.length - 1 ? tags.data[currentIndex + 1].name : null;

            let releaseNotes = '';

            if (previousTag) {
              // Get commits between previous tag and current tag
              const comparison = await github.rest.repos.compareCommits({
                owner: context.repo.owner,
                repo: context.repo.repo,
                base: previousTag,
                head: tag
              });

              // Format commits as release notes
              releaseNotes = '## What\'s Changed\n\n';
              for (const commit of comparison.data.commits) {
                const message = commit.commit.message.split('\n')[0]; // First line only
                const author = commit.commit.author.name;
                releaseNotes += `- ${message} (@${commit.author?.login || author})\n`;
              }

              releaseNotes += `\n**Full Changelog**: https://github.com/${context.repo.owner}/${context.repo.repo}/compare/${previousTag}...${tag}`;
            } else {
              releaseNotes = 'Initial release\n\nSee the assets below to download and install.';
            }

            core.setOutput('notes', releaseNotes);
            return releaseNotes;

      - name: Build and create release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'RPG Save Editor ${{ github.ref_name }}'
          releaseBody: ${{ steps.release_notes.outputs.notes }}
          releaseDraft: false
          prerelease: false

  update-latest-json:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Get release info
        id: release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const version = tag.replace('v', '');

            // Get release by tag
            const release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: tag
            });

            // Find the setup.exe asset
            const setupAsset = release.data.assets.find(asset =>
              asset.name.includes('setup.exe')
            );

            // Find the signature file
            const sigAsset = release.data.assets.find(asset =>
              asset.name.includes('setup.exe.sig')
            );

            if (!setupAsset) {
              core.setFailed('Setup executable not found in release assets');
              return;
            }

            // Download signature
            let signature = '';
            if (sigAsset) {
              const sigResponse = await github.request('GET ' + sigAsset.url, {
                headers: {
                  accept: 'application/octet-stream'
                }
              });
              signature = Buffer.from(sigResponse.data).toString('utf-8').trim();
            }

            core.setOutput('version', version);
            core.setOutput('tag', tag);
            core.setOutput('notes', release.data.body || '');
            core.setOutput('pub_date', release.data.published_at);
            core.setOutput('url', setupAsset.browser_download_url);
            core.setOutput('signature', signature);

      - name: Update latest.json
        env:
          VERSION: ${{ steps.release.outputs.version }}
          NOTES: ${{ steps.release.outputs.notes }}
          PUB_DATE: ${{ steps.release.outputs.pub_date }}
          SIGNATURE: ${{ steps.release.outputs.signature }}
          URL: ${{ steps.release.outputs.url }}
        run: |
          jq -n \
            --arg version "$VERSION" \
            --arg notes "$NOTES" \
            --arg pub_date "$PUB_DATE" \
            --arg signature "$SIGNATURE" \
            --arg url "$URL" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "windows-x86_64": {
                  signature: $signature,
                  url: $url
                }
              }
            }' > latest.json

      - name: Commit and push latest.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest.json
          git commit -m "update latest.json for ${{ steps.release.outputs.tag }}"
          git push origin main
